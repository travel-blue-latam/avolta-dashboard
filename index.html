<script>
const _supa = supabase.createClient(
  window.SUPABASE_URL,
  window.SUPABASE_KEY
);

async function loadAllData() {
  // Tables that exceed Supabase's 1000-row default limit — must be paginated
  const largeTables = new Set(["skuCountryFlat","skuStoreFlat","skuStoreADF","skuStoreADP"]);

  const datasets = ["zoneData","mAll","famG","catG","tEMEA","mEMEA","dEMEA","famEMEA",
    "tAME","mAME","dAME","famAME","tUK","mUK","dUK","famUK","tASIA","mASIA","dASIA",
    "famASIA","tCEI","mCEI","ctryCEI","famCEI","ctryEMEA","ctryAME","ctryDF","ctryDP",
    "ctryUK","ctryASIA","ctryGlobal","top15Stores","tDF","mDF","catDF","famDF","dDF",
    "tDP","mDP","catDP","famDP","dDP","yoyLossesAll","tabDefs",
    "cubeData","famCubeData","globalTotals","skuCountryFlat","skuStoreFlat",
    "skuStoreADF","skuStoreADP","gainsLosses","famGainsLosses"];

  async function fetchAll(name) {
    const PAGE = 1000;
    // Get total count first, then fetch all pages in parallel
    const { count, error: cErr } = await _supa.from(name).select('*', { count: 'exact', head: true });
    if (cErr || !count) {
      // Fallback: sequential fetch
      let all = [], from = 0, hasMore = true;
      while (hasMore) {
        const { data, error } = await _supa.from(name).select('*').range(from, from + PAGE - 1);
        if (error || !data || !data.length) break;
        all = all.concat(data); hasMore = data.length === PAGE; from += PAGE;
      }
      return all;
    }
    const pages = Math.ceil(count / PAGE);
    const pageReqs = Array.from({ length: pages }, function(_, i) {
      return _supa.from(name).select('*').range(i * PAGE, Math.min((i + 1) * PAGE - 1, count - 1));
    });
    const results = await Promise.all(pageReqs);
    const all = results.reduce(function(acc, r) { return acc.concat(r.data || []); }, []);
    console.log('[Dashboard] ' + name + ': ' + all.length + '/' + count + ' rows carregados');
    return all;
  }

  const promises = datasets.map(async function(name) {
    if (largeTables.has(name)) {
      const data = await fetchAll(name);
      return { name, data };
    }
    const { data, error } = await _supa.from(name).select('*');
    if (error) { console.warn('Falha ao carregar ' + name, error.message); return { name, data: [] }; }
    return { name, data: data || [] };
  });

  const results = await Promise.all(promises);
  results.forEach(function(r) { window[r.name] = r.data; });

  window.MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  window.regs = ['EMEA Europe','EMEA Africa','EMEA Middle East','AMERICA','UK','ASIA'];
}
</script>

function LT(locs){
var has26=locs.some(function(l){return (l.y26||0)>0;});
return '<table><thead><tr><th>Airport</th><th>Country</th><th>2023</th><th>2024</th><th>2025</th><th>YoY%</th><th>Share</th>'+(has26?'<th>2026 YTD</th><th>Δ 26/25</th>':'')+'</tr></thead><tbody>'+

}
function locsToCountryTable(locs){
  var byCtry={};
  locs.forEach(function(l){
    if(!byCtry[l.c])byCtry[l.c]={c:l.c,y23:0,y24:0,y25:0,y25s:0,y26:0};

    byCtry[l.c].y25s+=l.y25s||0;byCtry[l.c].y26+=l.y26||0;
  });
  var tot25=locs.reduce(function(s,l){return s+(l.y25||0);},0);

    r.y23=Math.round(r.y23);r.y24=Math.round(r.y24);r.y25=Math.round(r.y25);

'<div class="card"><h3>Top Countries — Americas '+label+'</h3><div class="st">Ranked by 2025 revenue</div>'+locsToCountryTable(locs)+
'<div class="insight">📍 <b>Channel analysis:</b> '+(label==='DUTY FREE'?'Duty Free accounts for 72% of Americas revenue. EZE leads with strong +24.9% growth. SCL and GRU are declining. MEX DF collapsed -31.1%, a critical issue. AEP (+62.6%) and SDQ (+41.7%) are bright spots showing new market potential.':'Duty Paid declined -15.4%, a steeper drop than Duty Free. MEX DP at -22% drives most of the loss. Every top-10 airport except MTY (+149%) is declining. GRU, GIG, BOG, BSB all contracting. This channel needs strategic intervention.')+'</div></div>'+

function getTabLocs(id){
  if(id==='EMEA') return tEMEA;
  if(id==='AME') return tAME;
  if(id==='DF') return tDF;
  if(id==='DP') return tDP;
  if(id==='UK') return tUK;
  if(id==='ASIA') return tASIA;
  if(id==='CEI') return tCEI;
  if(id==='ADF') return tDF;
  if(id==='ADP') return tDP;
  if(id==='SKUS') return tEMEA;
  // For global tabs, merge all and optionally filter by region
  var all=tEMEA.concat(tAME).concat(tUK).concat(tASIA);
  var st=filterState[id]||{};
  var regArr0=fArr(st.region);
  if(regArr0.length){
    all=all.filter(function(l){
      var meta=airportMeta[l.a]||{};
      return regArr0.indexOf(meta.zone)>=0;
    });
  }
  return all;
}

function getTabCubeKey(id){
  var st=filterState[id]||{};
  var ZONE_KEY={'EMEA':'EMEA','Americas':'AME','AMERICA':'AME','UK':'UK','ASIA':'ASIA','CEI & CRUISES':'CEI'};
  if(id==='OV'||id==='ES'){
    var ra=fArr(st.region);
    return (ra.length===1&&ZONE_KEY[ra[0]])||'OV';
  }
  if(CUBES[id]) return id;
  return null;
}

function getDisabledOptions(id){
  var st=filterState[id]||{};
  var cubeKey=effectiveCubeKey(id,getTabCubeKey(id));
  var mos=fMos(st);
  var result={markets:{},families:{},months:{}};

  // Market: check DF/DP cubes for any matching country/airport
  if(tabFilterCfg[id]&&tabFilterCfg[id].market){
    var mktHas=function(mk){
      return (CUBES[mk]||[]).some(function(l){
        if(!fHas(st.country,l.c)) return false;
        if(!fHas(st.airport,l.a)) return false;
        return true;
      });
    };
    result.markets['DUTY FREE']=!mktHas('DF');
    result.markets['DUTY PAID']=!mktHas('DP');
  }

  // Family: scale FAM_CUBES by location-filtered proportion, disable if y25=0
  if(cubeKey&&tabFilterCfg[id]&&tabFilterCfg[id].family){
    var totAll=cubeSum(CUBES[cubeKey]||[],[2025],mos);
    var filtApts=null;
    if(fArr(st.country).length||fArr(st.airport).length){
      filtApts=(CUBES[cubeKey]||[]).filter(function(l){
        if(!fHas(st.country,l.c)) return false;
        if(!fHas(st.airport,l.a)) return false;
        return true;
      }).map(function(l){return l.a;});
    }
    var totFilt=filtApts!==null
      ?cubeSum((CUBES[cubeKey]||[]).filter(function(l){return filtApts.indexOf(l.a)>=0;}), [2025], mos)
      :totAll;
    var ratio=(totAll>0&&totFilt>0)?totFilt/totAll:1;
    (FAM_CUBES[cubeKey]||[]).forEach(function(f){
      result.families[f.f]=(Math.round(cubeSum([f],[2025],mos)*ratio)<=0);
    });
  }

  // Month: disable months with no 2025 data for the current location filter
  if(cubeKey&&tabFilterCfg[id]&&tabFilterCfg[id].month){
    var raw=(CUBES[cubeKey]||[]).filter(function(l){
      if(!fHas(st.country,l.c)) return false;
      if(!fHas(st.airport,l.a)) return false;
      return true;
    });
    MONTHS.forEach(function(mo){
      result.months[mo]=(cubeSum(raw,[2025],[mo])<=0);
    });
  }

  return result;
}

// --- MULTI-SELECT HELPERS ---
function fArr(v){return Array.isArray(v)?v:(v&&v!==''?[v]:[]);}
function fHas(filter,val){var a=fArr(filter);return !a.length||a.indexOf(val)>=0;}
function fMos(st){var m=fArr(st.month);return m.length?m:null;}

function msOpen(btn){
  var dd=btn.parentElement.querySelector('.ms-dd');
  document.querySelectorAll('.ms-dd.open').forEach(function(d){if(d!==dd){d.classList.remove('open');d.previousElementSibling&&d.previousElementSibling.classList.remove('open');}});
  var opening=!dd.classList.contains('open');
  dd.classList.toggle('open');
  btn.classList.toggle('open',opening);
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.ms-wrap')){
    document.querySelectorAll('.ms-dd.open').forEach(function(d){d.classList.remove('open');});
    document.querySelectorAll('.ms-btn.open').forEach(function(b){b.classList.remove('open');});
  }
});

function applyFltArr(id,key,val,checked){
  if(!filterState[id])filterState[id]={};
  if(!Array.isArray(filterState[id][key]))filterState[id][key]=[];
  var cur=filterState[id][key];
  if(val==='__ALL__'){filterState[id][key]=[];}
  else if(checked){if(cur.indexOf(val)<0)cur.push(val);}
  else{filterState[id][key]=cur.filter(function(v){return v!==val;});}
  if(key==='country')filterState[id].airport=[];
  if(key==='region'){filterState[id].country=[];filterState[id].airport=[];}
  showTab(id,true);
}

function buildMS(id,key,options,allLabel,disabledSet){
  var sel=fArr(filterState[id]&&filterState[id][key]);
  var lbl=!sel.length?allLabel:(sel.length===1?sel[0]:sel.length+' selected');
  var h='<div class="ms-wrap"><button class="ms-btn" onclick="msOpen(this)" type="button"><span>'+lbl+'</span><span>▾</span></button><div class="ms-dd">'+
    '<div class="ms-opt ms-all"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox"'+(sel.length===0?' checked':'')+' onchange="applyFltArr(\''+id+'\',\''+key+'\',\'__ALL__\',this.checked)"> Todos</label></div>';
  options.forEach(function(o){
    var v=typeof o==='object'?(o.value||o.label):o;
    var t=typeof o==='object'?(o.label||o.value):o;
    var dis=(disabledSet&&disabledSet[v])?' ms-dis':'';
    h+='<div class="ms-opt'+dis+'"><label style="display:flex;align-items:center;gap:6px;cursor:pointer">'+
      '<input type="checkbox"'+(sel.indexOf(v)>=0?' checked':'')+
      (dis?' disabled':'')+
      ' onchange="applyFltArr(\''+id+'\',\''+key+'\',\''+v.replace(/'/g,"\\'")+'\''+',this.checked)"> '+t+'</label></div>';
  });
  h+='</div></div>';
  return h;
}

function applyFlt(id,key,val){

  if(key==='region'){filterState[id].country=[];filterState[id].airport=[];}
  showTab(id,true);
}

// Compute totals for a month-filtered context
function fMoTot(id,tot,mo){
  var st=filterState[id]||{};
  var selMos=fMos(st);
  if(!selMos)return tot;
  var mData=mo.filter(function(m){return selMos.indexOf(m.m)>=0;});
  if(!mData.length)return tot;
  var totA=mo.reduce(function(s,m){return s+m.a;},0);
  var totB=mo.reduce(function(s,m){return s+m.b;},0);
  var selA=mData.reduce(function(s,m){return s+m.a;},0);
  var selB=mData.reduce(function(s,m){return s+m.b;},0);
  var ratio24=totA>0?selA/totA:1;
  var ratio25=totB>0?selB/totB:1;
  return {y24:Math.round(tot.y24*ratio24),y25:Math.round(tot.y25*ratio25),u25:Math.round((tot.u25||0)*ratio25)};
}


// Helpers to filter data

// ================================================================
// FILTER ENGINE v2 — cube-based real-time filtering
// ================================================================
var MONTHS = []; // loaded via API

function cubeSum(locs, years, months){
  // years: [2024] or [2024,2025] or [2023]
  // months: null (all) or ['Jan','Feb',...]
  var mos = months || MONTHS;
  return locs.reduce(function(s,l){
    return s + years.reduce(function(sy,yr){
      return sy + mos.reduce(function(sm,mo){
        return sm + (l[yr+'_'+mo]||0);
      },0);
    },0);
  },0);
}

function cubeLoc(locs){
  // Aggregate cube entries to {a,c,y23,y24,y25} for a given filtered locs array
  return locs.map(function(l){
    var y23=cubeSum([l],[2023],null);
    var y24=cubeSum([l],[2024],null);
    var y25=cubeSum([l],[2025],null);
    var yoy=y24>0?Math.round((y25/y24-1)*1000)/10:0;
    return {a:l.a,c:l.c,y23:Math.round(y23),y24:Math.round(y24),y25:Math.round(y25),yoy:yoy};
  }).filter(function(l){return l.y24>0||l.y25>0;})
    .sort(function(a,b){return b.y25-a.y25;});
}

// Returns the cube key to use after resolving the market filter
function effectiveCubeKey(tabId,cubeKey){
  var st=filterState[tabId]||{};
  var mkt=fArr(st.market);
  if(mkt.length===1&&mkt[0]==='DUTY FREE'&&(cubeKey==='AME'||cubeKey==='OV')) return 'DF';
  if(mkt.length===1&&mkt[0]==='DUTY PAID'&&(cubeKey==='AME'||cubeKey==='OV')) return 'DP';
  return cubeKey;
}
// Returns the share of a family's revenue vs total for given cube/years/months
function famRatio(ck,fam,yrs,mos){
  var fams=fArr(fam); if(!fams.length) return 1;
  var fd=FAM_CUBES[ck]||[];
  var tot=cubeSum(fd,yrs,mos); if(!tot) return 0;
  return cubeSum(fd.filter(function(f){return fams.indexOf(f.f)>=0;}),yrs,mos)/tot;
}

function cubeLocFiltered(tabId, cubeKey){
  var st = filterState[tabId]||{};
  var ck=effectiveCubeKey(tabId,cubeKey);
  var raw = (CUBES[ck]||[]).filter(function(l){
    if(!fHas(st.country,l.c)) return false;
    if(!fHas(st.airport,l.a)) return false;
    return true;
  });
  var mos = fMos(st);
  var mos26=MONTHS.filter(function(mo){return cubeSum(CUBES[ck]||[],[2026],[mo])>0;});
  var mos26s=mos26.length?(mos?mos26.filter(function(mo){return mos.indexOf(mo)>=0;}):mos26):null;
  var fr24=famRatio(ck,st.family,[2024],mos);
  var fr25=famRatio(ck,st.family,[2025],mos);
  var fr26=famRatio(ck,st.family,[2026],mos26s);
  return raw.map(function(l){
    var y23=cubeSum([l],[2023],null);
    var y24=Math.round(cubeSum([l],[2024],mos)*fr24);
    var y25=Math.round(cubeSum([l],[2025],mos)*fr25);
    var y25s=Math.round(cubeSum([l],[2025],mos26s)*fr25);
    var y26=Math.round(cubeSum([l],[2026],mos26s)*fr26);
    var yoy=y24>0?Math.round((y25/y24-1)*1000)/10:0;
    var yoy26=y25s>0?Math.round((y26/y25s-1)*1000)/10:0;
    var tot=cubeSum(CUBES[ck]||[],[2025],mos)*fr25;
    return {a:l.a,c:l.c,
            y23:Math.round(y23),
            y24:y24,
            y25:y25,
            y25s:y25s,
            y26:y26,
            yoy:yoy,
            yoy26:yoy26,
            s:tot>0?Math.round(y25/tot*1000)/10:0};
  }).filter(function(l){return l.y24>0||l.y25>0||l.y26>0;})
    .sort(function(a,b){return b.y25-a.y25;});
}

function cubeMonthly(tabId, cubeKey){
  var st = filterState[tabId]||{};
  var ck=effectiveCubeKey(tabId,cubeKey);
  var raw = (CUBES[ck]||[]).filter(function(l){
    if(!fHas(st.country,l.c)) return false;

  });
  var selMos=fMos(st);
  if(selMos){
    return selMos.map(function(mo){

               a:Math.round(cubeSum(raw,[2024],[mo])*famRatio(ck,st.family,[2024],[mo])),

               c:Math.round(cubeSum(raw,[2026],[mo])*famRatio(ck,st.family,[2026],[mo]))};
    });
  }
  return MONTHS.map(function(mo){
    return {m:mo,
            a:Math.round(cubeSum(raw,[2024],[mo])*famRatio(ck,st.family,[2024],[mo])),
            b:Math.round(cubeSum(raw,[2025],[mo])*famRatio(ck,st.family,[2025],[mo])),
            c:Math.round(cubeSum(raw,[2026],[mo])*famRatio(ck,st.family,[2026],[mo]))};
  });
}

function cubeFam(tabId, cubeKey){
  var st = filterState[tabId]||{};
  var ck=effectiveCubeKey(tabId,cubeKey);
  var filtApts = null;
  var cntArr=fArr(st.country); var aptArr=fArr(st.airport);
  if(cntArr.length || aptArr.length){
    filtApts = (CUBES[ck]||[])
      .filter(function(l){
        if(!fHas(st.country,l.c)) return false;
        if(!fHas(st.airport,l.a)) return false;
        return true;
      }).map(function(l){return l.a;});
  }
  var mos = fMos(st);
  var famRaw = FAM_CUBES[ck]||[];
  var mos26=MONTHS.filter(function(mo){return cubeSum(CUBES[ck]||[],[2026],[mo])>0;});
  var mos26eff=mos26.length?(mos?mos26.filter(function(mo){return mos.indexOf(mo)>=0;}):mos26):null;
  var totAll = cubeSum(CUBES[ck]||[], [2025], mos);
  var totFilt = filtApts !== null
    ? cubeSum((CUBES[ck]||[]).filter(function(l){return filtApts.indexOf(l.a)>=0;}), [2025], mos)
    : totAll;
  var ratio = (totAll > 0 && totFilt > 0) ? totFilt/totAll : 1;
  var totAll26=cubeSum(CUBES[ck]||[],[2026],mos26eff);
  var totFilt26=filtApts!==null?cubeSum((CUBES[ck]||[]).filter(function(l){return filtApts.indexOf(l.a)>=0;}),[2026],mos26eff):totAll26;
  var ratio26=(totAll26>0&&totFilt26>0)?totFilt26/totAll26:1;
  var famArr=fArr(st.family);
  return famRaw.filter(function(f){
    if(famArr.length&&famArr.indexOf(f.f)<0) return false;
    return true;
  }).map(function(f){
    var y23=cubeSum([f],[2023],null);
    var y24=Math.round(cubeSum([f],[2024],mos)*ratio);
    var y25=Math.round(cubeSum([f],[2025],mos)*ratio);
    var y26=Math.round(cubeSum([f],[2026],mos26eff)*ratio26);
    var ch=y25-y24;
    var yoy=y24>0?(y25/y24-1):0;
    var totF=famRaw.reduce(function(s,x){
      return s+Math.round(cubeSum([x],[2025],mos)*ratio);
    },0);
    return {f:f.f,y23:Math.round(y23),y24:y24,y25:y25,y26:y26,ch:ch,yoy:yoy,
            sh:totF>0?Math.round(y25/totF*1000)/10:0};
  }).filter(function(f){return f.y24>0||f.y25>0;})
    .sort(function(a,b){return b.y25-a.y25;});
}

function cubeKPI(tabId, cubeKey){

// Country table from cube
function cubeCountryTable(tabId, cubeKey){
  var st = filterState[tabId]||{};
  var ck=effectiveCubeKey(tabId,cubeKey);
  var mos = fMos(st);
  var mos26=MONTHS.filter(function(mo){return cubeSum(CUBES[ck]||[],[2026],[mo])>0;});
  var mos26s=mos26.length?(mos?mos26.filter(function(mo){return mos.indexOf(mo)>=0;}):mos26):null;
  var fr24=famRatio(ck,st.family,[2024],mos);
  var fr25=famRatio(ck,st.family,[2025],mos);
  var fr26=famRatio(ck,st.family,[2026],mos26s);
  var raw = (CUBES[ck]||[]).filter(function(l){
    if(!fHas(st.country,l.c)) return false;
    if(!fHas(st.airport,l.a)) return false;
    return true;
  });
  var byCtry = {};
  raw.forEach(function(l){
    if(!byCtry[l.c]) byCtry[l.c]={c:l.c,y23:0,y24:0,y25:0,y25s:0,y26:0};
    byCtry[l.c].y23 += cubeSum([l],[2023],null);
    byCtry[l.c].y24 += cubeSum([l],[2024],mos)*fr24;
    byCtry[l.c].y25 += cubeSum([l],[2025],mos)*fr25;
    byCtry[l.c].y25s += cubeSum([l],[2025],mos26s)*fr25;
    byCtry[l.c].y26 += cubeSum([l],[2026],mos26s)*fr26;
  });
  var rows = Object.values(byCtry).map(function(r){
    r.y23=Math.round(r.y23); r.y24=Math.round(r.y24); r.y25=Math.round(r.y25);
    r.y25s=Math.round(r.y25s); r.y26=Math.round(r.y26);
    r.yoy1=r.y23>0?Math.round((r.y24/r.y23-1)*1000)/10:0;
    r.yoy2=r.y24>0?Math.round((r.y25/r.y24-1)*1000)/10:0;
    r.yoy3=r.y25s>0?Math.round((r.y26/r.y25s-1)*1000)/10:0;
    var tot=Object.values(byCtry).reduce(function(s,x){return s+x.y25;},0);
    r.sh=tot>0?Math.round(r.y25/tot*1000)/10:0;
    return r;
  }).sort(function(a,b){return b.y25-a.y25;});
  return CT(rows);
}

// Filter locations by month - we use monthly data to adjust y24/y25 on locs proportionally
// Since we don't have airport-level monthly breakdown, month filter affects charts but location table stays
function fLocsMonth(id,locs,moZone,moTotal){
  var st=filterState[id]||{};
  var selMos=fMos(st);
  if(!selMos)return locs;
  // Find ratio of selected months vs full year for this zone
  var mData=moZone?moZone.filter(function(m){return selMos.indexOf(m.m)>=0;}):[];
  if(!mData.length)return locs;
  var totA=moZone.reduce(function(s,m){return s+m.a;},0);
  var totB=moZone.reduce(function(s,m){return s+m.b;},0);
  var selA=mData.reduce(function(s,m){return s+m.a;},0);
  var selB=mData.reduce(function(s,m){return s+m.b;},0);
  var ratio24=totA>0?selA/totA:1;
  var ratio25=totB>0?selB/totB:1;
  return locs.map(function(l){
    return Object.assign({},l,{y24:Math.round(l.y24*ratio24),y25:Math.round(l.y25*ratio25)});
  });
}

// Returns per-airport 2026 and same-period 2025 revenue from a cube
function getApt2026Map(ck, selMos){
  var cubeApts=CUBES[ck]||[];
  if(!cubeApts.length)return {y26:{},y25s:{},mos26:[]};
  var mos26=MONTHS.filter(function(mo){return cubeSum(cubeApts,[2026],[mo])>0;});
  var mos26eff=selMos&&selMos.length?mos26.filter(function(mo){return selMos.indexOf(mo)>=0;}):mos26;
  var y26={},y25s={};
  cubeApts.forEach(function(l){
    y26[l.a]=Math.round(cubeSum([l],[2026],mos26eff.length?mos26eff:null));
    y25s[l.a]=Math.round(cubeSum([l],[2025],mos26eff.length?mos26eff:null));
  });
  return {y26:y26,y25s:y25s,mos26:mos26eff};
}
// Returns per-country 2026 and same-period 2025 revenue from a cube (aggregated by airportMeta.country)
// Supports both exact and uppercase country name lookup to handle format differences between data sources
function getCountry2026Map(ck, selMos){
  var cubeApts=CUBES[ck]||[];
  if(!cubeApts.length)return {y26:{},y25s:{},mos26:[]};
  var mos26=MONTHS.filter(function(mo){return cubeSum(cubeApts,[2026],[mo])>0;});
  if(!mos26.length)return {y26:{},y25s:{},mos26:[]};
  var mos26eff=selMos&&selMos.length?mos26.filter(function(mo){return selMos.indexOf(mo)>=0;}):mos26;
  if(!mos26eff.length)return {y26:{},y25s:{},mos26:[]};
  var y26={},y25s={};
  cubeApts.forEach(function(l){
    var country=(airportMeta[l.a]||{}).country||'';
    if(!country)return;
    var v26=Math.round(cubeSum([l],[2026],mos26eff));
    var v25s=Math.round(cubeSum([l],[2025],mos26eff));
    // Store under exact AND uppercase key (handles case differences across data tables)
    y26[country]=(y26[country]||0)+v26;
    y25s[country]=(y25s[country]||0)+v25s;
    var cu=country.toUpperCase();
    if(cu!==country){y26[cu]=(y26[cu]||0)+v26;y25s[cu]=(y25s[cu]||0)+v25s;}
  });
  return {y26:y26,y25s:y25s,mos26:mos26eff};
}

function build2026Section(tabId, cubeKey){
  var ck=effectiveCubeKey(tabId,cubeKey);
  var fl=cubeLocFiltered(tabId,ck);
  var has26=fl.some(function(l){return (l.y26||0)>0;});
  if(!has26) return '';
  var rows=fl.filter(function(l){return (l.y26||0)>0;})
    .sort(function(a,b){return (b.y26||0)-(a.y26||0);}).slice(0,30);
  var tot26=rows.reduce(function(s,l){return s+(l.y26||0);},0);
  var tot25s=rows.reduce(function(s,l){return s+(l.y25s||0);},0);
  var yoyTot=tot25s>0?Math.round((tot26/tot25s-1)*1000)/10:0;
  var h='<div class="card" style="border-left:4px solid #10b981">';
  h+='<h3>📊 Revenue Overview 2026 YTD (Feb)</h3>';
  h+='<div class="st">Dados de receita por aeroporto (cubeData). Dados 2026 no nível de SKU ainda não disponíveis — exibindo agregados por aeroporto.</div>';
  h+='<div class="kpi-row" style="grid-template-columns:repeat('+(tot25s>0?'3':'1')+',1fr);margin-bottom:12px">';
  h+='<div class="kpi"><div class="lbl">2026 YTD Total</div><div class="val" style="color:#10b981">'+fmt(tot26)+'</div></div>';
  if(tot25s>0){
    h+='<div class="kpi"><div class="lbl">2025 Mesmo Período</div><div class="val">'+fmt(tot25s)+'</div></div>';
    h+='<div class="kpi"><div class="lbl">Δ% 2026/2025</div><div class="val"><span class="badge '+bg(yoyTot)+'">'+fP(yoyTot)+'</span></div></div>';
  }
  h+='</div>';
  h+='<div class="tbl-scroll"><table><thead><tr><th>Airport</th><th>Country</th><th>Zone</th><th>2025 (mesmo período)</th><th>2026 YTD</th><th>Δ CHF</th><th>Δ%</th></tr></thead><tbody>';
  rows.forEach(function(l){
    var r25=l.y25s||0; var r26=l.y26||0;
    var delta=r26-r25;
    var pct=r25>0?Math.round((r26/r25-1)*1000)/10:0;
    h+='<tr><td><b>'+l.a+'</b></td><td>'+(l.c||'-')+'</td><td>'+((airportMeta[l.a]||{}).zone||'-')+'</td>';
    h+='<td>'+fmt(r25)+'</td>';
    h+='<td style="font-weight:700;color:#10b981">'+fmt(r26)+'</td>';
    h+='<td><span style="color:'+(delta>=0?'var(--green)':'var(--red)')+';font-weight:600">'+(delta>=0?'+':'')+fmt(delta)+'</span></td>';
    h+='<td>'+(r25>0?'<span class="badge '+bg(pct)+'">'+fP(pct)+'</span>':'-')+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function enrichZonesY26(fz, selMos){
  var CK={EMEA:'EMEA',AMERICA:'AME',UK:'UK',ASIA:'ASIA'};
  return fz.map(function(z){
    if(z.yoy26!==undefined&&z.yoy26!==0) return z;
    var ck=CK[z.zone]; if(!ck||!(z.y26>0)) return Object.assign({},z,{yoy26:0});
    var mos26=MONTHS.filter(function(mo){return cubeSum(CUBES[ck]||[],[2026],[mo])>0;});
    var mos26eff=selMos&&selMos.length?mos26.filter(function(mo){return selMos.indexOf(mo)>=0;}):mos26;
    var y25s=Math.round(cubeSum(CUBES[ck]||[],[2025],mos26eff.length?mos26eff:null));
    return Object.assign({},z,{y25s:y25s,yoy26:y25s>0?Math.round((z.y26/y25s-1)*1000)/10:0});
  });
}
function computeOVZones(tabId){
  var st=filterState[tabId]||{};
  var ZONE_KEY={'EMEA':'EMEA','Americas':'AME','AMERICA':'AME','UK':'UK','ASIA':'ASIA','CEI & CRUISES':'CEI'};
  var ZONE_NAME={'EMEA':'EMEA','Americas':'AMERICA','AMERICA':'AMERICA','UK':'UK','ASIA':'ASIA','CEI & CRUISES':'CEI & CRUISES'};
  var hasMo=!!fMos(st);
  var hasLoc=fArr(st.country).length||fArr(st.airport).length;
  var regArr=fArr(st.region);
  var hasReg=regArr.length>0;
  // No filters at all: use static zoneData (has y23)
  if(!hasLoc&&!hasReg&&!hasMo) return zoneData;
  // Region only (no location, no month): filter static zoneData by zone name
  if(hasReg&&!hasLoc&&!hasMo){
    var zNames=regArr.map(function(r){return ZONE_NAME[r]||r;});
    return zoneData.filter(function(z){return zNames.indexOf(z.zone)>=0;});
  }
  // Location or month filter active: use cube for real-time aggregation
  var cubeKey=(hasReg&&regArr.length===1&&ZONE_KEY[regArr[0]])||'OV';
  var fl=cubeLocFiltered(tabId,cubeKey);
  var byZone={};
  fl.forEach(function(l){
    var zone=(airportMeta[l.a]||{}).zone||'Unknown';
    if(!byZone[zone])byZone[zone]={zone:zone,y24:0,y25:0,y25s:0,y26:0,y23:0,yoy1:0};
    byZone[zone].y24+=l.y24||0; byZone[zone].y25+=l.y25||0;
    byZone[zone].y25s+=l.y25s||0; byZone[zone].y26+=l.y26||0;
  });
  return Object.values(byZone).map(function(z){
    z.yoy2=z.y24>0?Math.round((z.y25/z.y24-1)*1000)/10:0;
    z.yoy26=z.y25s>0?Math.round((z.y26/z.y25s-1)*1000)/10:0;
    return z;
  }).sort(function(a,b){return b.y25-a.y25;});
}

// Helper: filter categories by family
function fFilt(cats,st){
  var famArr=fArr(st&&st.family);
  if(!st||!famArr.length)return cats;
  var c=FAM_CAT_MAP[famArr[0]]||[];
  if(!c.length)return cats;
  return cats.filter(function(cat){return c.indexOf(cat.c)>=0;});
}

// Add percentage labels to doughnut charts
const doughnutPlugin = {
  id: 'doughnutLabels',
  afterDatasetDraw(chart) {
    if (chart.config.type !== 'doughnut') return;
    const {ctx, data} = chart;
    const total = data.datasets[0].data.reduce((a, b) => a + b, 0);
    
    chart.getDatasetMeta(0).data.forEach((arc, i) => {
      const value = data.datasets[0].data[i];
      const pct = ((value / total) * 100).toFixed(1) + '%';
      
      const {x, y} = arc.tooltipPosition();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(pct, x, y);
    });
  }
};

Chart.register(doughnutPlugin);

// Build skuFamilyMap dynamically from all Supabase data sources
// Covers all SKUs present in the data — no hardcoding needed
(function(){
  function addSKUFamily(sku, fam){
    var s=String(sku).trim(); var f=String(fam).trim();
    if(s&&f&&s!=='undefined'&&f!=='undefined') skuFamilyMap[s]=f;
  }
  // ONLY use yoyLossesAll — skuCountryFlat/skuStoreFlat/skuStoreADF/skuStoreADP
  // have INCORRECT family assignments in Supabase and must NOT be used here.
  // yoyLossesAll supplements the baseline for any SKUs not in the hardcoded map.
  // Existing hardcoded entries are NOT overwritten (only new SKUs are added).
  (window.yoyLossesAll||[]).forEach(function(item){
    var s=item.SKU||item.sku; var f=item.FAMILY||item.family;
    if(s&&f&&!skuFamilyMap[String(s).trim()]) addSKUFamily(s,f);
  });
  console.log('[Dashboard] skuFamilyMap: '+Object.keys(skuFamilyMap).length+' SKUs mapeados (base+yoyLossesAll)');
})();
